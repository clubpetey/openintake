name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Install deps
        run: npm ci

      - name: Forbid caret-pinned codegen tools
        run: bash scripts/check-pins.sh

      - name: Validate schema fixtures
        run: |
          npm run validate-schema
          npm run validate-schema:reject

      - name: Regenerate types from schema
        run: npm run codegen

      - name: Fail if generated types are stale
        run: |
          if ! git diff --exit-code core/src/generated/payload.ts relay/internal/payload/types.go; then
            echo "::error::generated types are stale — run 'npm run codegen' and commit the result"
            exit 1
          fi

      - name: Type-check generated TS
        run: npm run -w @openintake/core type-check

      - name: Build + vet generated Go
        working-directory: relay
        run: |
          go build ./...
          go vet ./internal/payload/...

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: relay/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: relay
          args: --timeout=5m

  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install deps
        run: npm ci
      - name: ESLint (core)
        run: npm run lint -w @openintake/core
      - name: ESLint (vue)
        run: npm run lint -w @openintake/vue
      - name: Prettier check
        run: npm run lint:prettier

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: relay/go.sum
      - name: Go test (race)
        working-directory: relay
        run: go test -race ./...

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Type-check (core)
        run: npm run -w @openintake/core type-check
      - name: Test (core)
        run: npm test -w @openintake/core
      - name: Test (vue)
        run: npm test -w @openintake/vue

  goreleaser-check:
    runs-on: ubuntu-latest
    needs: contract   # only validate goreleaser after schema/codegen sanity passes
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Run goreleaser check
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: '2.7.0'
          args: check --config relay/.goreleaser.yaml

  snapshot-build:
    # Run only on PRs — on main pushes, the snapshot is redundant with
    # goreleaser-check (faster) and the dist/ artifact would pile up.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: goreleaser-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs the full history for the changelog template

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Run goreleaser snapshot
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: '2.7.0'
          args: release --snapshot --clean --config relay/.goreleaser.yaml

      - name: Verify all 5 archives present
        run: |
          set -euo pipefail
          missing=0
          for pattern in \
            "dist/openintake-relay_*_linux_amd64.tar.gz" \
            "dist/openintake-relay_*_linux_arm64.tar.gz" \
            "dist/openintake-relay_*_darwin_amd64.tar.gz" \
            "dist/openintake-relay_*_darwin_arm64.tar.gz" \
            "dist/openintake-relay_*_windows_amd64.zip"; do
            if ! ls $pattern >/dev/null 2>&1; then
              echo "::error::missing archive matching pattern: $pattern"
              missing=1
            fi
          done
          if [ ! -f dist/SHA256SUMS.txt ]; then
            echo "::error::dist/SHA256SUMS.txt missing"
            missing=1
          else
            sums=$(wc -l < dist/SHA256SUMS.txt)
            echo "SHA256SUMS.txt has $sums entries"
          fi
          exit $missing

      - name: Verify no secrets in archives
        run: |
          set -euo pipefail
          # Pattern matches actual leak shapes only, not docs filenames that
          # happen to contain the word 'secrets' (e.g. configuration-and-secrets-design.md).
          # Rejects: dotfile .env (any depth), secrets/ directory entries,
          # files literally named 'credentials' or '*credentials' at any depth.
          pattern='(^|/)(\.env(\..*)?|secrets/|credentials(\..*)?|.*\.pem|.*\.key|local-dev/)'
          leak=0
          for f in dist/openintake-relay_*.tar.gz; do
            if tar -tzf "$f" | grep -qE "$pattern"; then
              echo "::error::archive contains secret-like file: $f"
              tar -tzf "$f" | grep -E "$pattern"
              leak=1
            fi
          done
          for f in dist/openintake-relay_*.zip; do
            if unzip -l "$f" | awk '{print $4}' | grep -qE "$pattern"; then
              echo "::error::archive contains secret-like file: $f"
              unzip -l "$f" | awk '{print $4}' | grep -E "$pattern"
              leak=1
            fi
          done
          exit $leak

      - name: Verify binary version string
        run: |
          set -euo pipefail
          mkdir -p /tmp/openintake-check
          tar xzf dist/openintake-relay_*_linux_amd64.tar.gz -C /tmp/openintake-check
          /tmp/openintake-check/openintake-relay --version
          # The --version flag must exit 0 and print a non-empty line that
          # includes 'snapshot' (the snapshot-template suffix). This is the
          # §11.1 item 5 binary-vs-tag identity invariant.
          out=$(/tmp/openintake-check/openintake-relay --version)
          case "$out" in
            *snapshot*) echo "OK: version string contains 'snapshot'" ;;
            *)          echo "::error::version string missing snapshot suffix: $out"; exit 1 ;;
          esac

      - name: Upload dist/ artifact for PR review
        uses: actions/upload-artifact@v4
        with:
          name: relay-snapshot-dist-${{ github.run_id }}
          path: dist/
          retention-days: 7
