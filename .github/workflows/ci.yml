name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Install deps
        run: npm ci

      - name: Forbid caret-pinned codegen tools
        run: bash scripts/check-pins.sh

      - name: Validate schema fixtures
        run: |
          npm run validate-schema
          npm run validate-schema:reject

      - name: Regenerate types from schema
        run: npm run codegen

      - name: Fail if generated types are stale
        run: |
          if ! git diff --exit-code core/src/generated/payload.ts relay/internal/payload/types.go; then
            echo "::error::generated types are stale — run 'npm run codegen' and commit the result"
            exit 1
          fi

      - name: Type-check generated TS
        run: npm run -w @intake/core type-check

      - name: Build + vet generated Go
        working-directory: relay
        run: |
          go build ./...
          go vet ./internal/payload/...

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: relay/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: relay
          args: --timeout=5m

  lint-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install deps
        run: npm ci
      - name: ESLint (core)
        run: npm run lint -w @intake/core
      - name: ESLint (vue)
        run: npm run lint -w @intake/vue
      - name: Prettier check
        run: npm run lint:prettier

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: relay/go.sum
      - name: Go test (race)
        working-directory: relay
        run: go test -race ./...

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Type-check (core)
        run: npm run -w @intake/core type-check
      - name: Test (core)
        run: npm test -w @intake/core
      - name: Test (vue)
        run: npm test -w @intake/vue
