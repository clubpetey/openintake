server:
  addr: ":9000"
  external_url: "http://example.com"
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
  trusted_proxies:
    - "10.0.0.0/8"
    - "192.168.0.0/16"
llm:
  provider: "anthropic"
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-4-6"
    max_tokens: 2048
  openai:
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4o-mini"
    max_tokens: 512
  gemini:
    api_key_env: "GEMINI_API_KEY"
    model: "gemini-2.0-flash"
    max_tokens: 512
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.1"
    bearer_token_env: ""
    max_tokens: 512
  system_prompt_file: ""
auth:
  modes:
    anonymous: true
    email: true
    sso: true
  email:
    smtp_host: "smtp.example.com"
    smtp_port: 587
    smtp_user: "intake@example.com"
    smtp_pass_env: "INTAKE_SMTP_PASS"
    from: "Intake <intake@example.com>"
    code_ttl: "10m"
    jwt_ttl: "15m"
    jwt_secret_env: "INTAKE_EMAIL_JWT_SECRET"
  sso:
    issuer: "https://example.us.auth0.com/"
    audience: "https://api.example.com"
    jwks_url: "https://example.us.auth0.com/.well-known/jwks.json"
    hs256_secret_env: ""
    claims:
      user_id: "sub"
      email: "email"
      display_name: "name"
  anonymous:
    allow_without_captcha: false
adapters:
  webhook:
    enabled: true
    url: "http://localhost:9099/intake"
    headers:
      X-Custom: "value"
    retry:
      max_attempts: 5
      backoff: "fixed"
  chatwoot:
    enabled: true
    base_url: "https://chatwoot.example.com"
    account_id: 1
    inbox_id: 3
    api_token_env: "CHATWOOT_TOKEN"
  fider:
    enabled: true
    base_url: "https://feedback.example.com"
    api_key_env: "FIDER_API_KEY"
  zendesk:
    enabled: false
    subdomain: "example"
    email: "agent@example.com"
    api_token_env: "ZENDESK_API_TOKEN"
    default_priority: "normal"
  linear:
    enabled: false
    api_key_env: "LINEAR_API_KEY"
    team_id: "TEAM_ID"
routing:
  default_adapter: "chatwoot"
  rules:
    - when:
        classification: "bug"
      to: "chatwoot"
    - when:
        classification: ["question", "other"]
      to: "chatwoot"
license:
  file: "/etc/intake/license.json"
captcha:
  enabled: false
  provider: "turnstile"
  site_key: "0x4AAA000000ExampleSiteKey"
  secret_key_env: "INTAKE_TURNSTILE_SECRET"
  required_for: ["anonymous"]
ratelimit:
  per_ip:
    requests_per_second: 2.0
    burst: 10
    idle_ttl: "5m"
  per_session:
    max_turns: 30
    max_input_tokens: 12000
    session_ttl: "30m"
  daily_llm_budget:
    max_input_tokens: 1000000
    max_output_tokens: 200000
    action_on_exceeded: "reject"
