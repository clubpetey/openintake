server:
  addr: ":9000"
  external_url: "http://example.com"
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
llm:
  provider: "anthropic"
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-4-6"
    max_tokens: 2048
  openai:
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-4o-mini"
    max_tokens: 512
  gemini:
    api_key_env: "GEMINI_API_KEY"
    model: "gemini-2.0-flash"
    max_tokens: 512
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3.1"
    bearer_token_env: ""
    max_tokens: 512
  system_prompt_file: ""
auth:
  modes:
    anonymous: true
adapters:
  webhook:
    enabled: true
    url: "http://localhost:9099/intake"
    headers:
      X-Custom: "value"
    retry:
      max_attempts: 5
      backoff: "fixed"
  chatwoot:
    enabled: true
    base_url: "https://chatwoot.example.com"
    account_id: 1
    inbox_id: 3
    api_token_env: "CHATWOOT_TOKEN"
  fider:
    enabled: true
    base_url: "https://feedback.example.com"
    api_key_env: "FIDER_API_KEY"
  zendesk:
    enabled: false
    subdomain: "example"
    email: "agent@example.com"
    api_token_env: "ZENDESK_API_TOKEN"
    default_priority: "normal"
  linear:
    enabled: false
    api_key_env: "LINEAR_API_KEY"
    team_id: "TEAM_ID"
routing:
  default_adapter: "chatwoot"
  rules:
    - when:
        classification: "bug"
      to: "chatwoot"
    - when:
        classification: ["question", "other"]
      to: "chatwoot"
license:
  file: "/etc/intake/license.json"
