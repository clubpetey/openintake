server:
  addr: ":18087"
  external_url: "http://127.0.0.1:18087"
  cors_origins: ["http://localhost:5173"]
auth:
  modes:
    anonymous: true
  anonymous:
    allow_without_captcha: true
adapters:
  webhook:
    enabled: true
    url: "http://127.0.0.1:1/discard"
routing:
  default_adapter: "webhook"
ratelimit:
  daily_llm_budget:
    action_on_exceeded: "reject"
attachments:
  enabled: false
