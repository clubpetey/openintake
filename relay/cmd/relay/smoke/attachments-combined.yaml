server:
  addr: ":18090"
  external_url: "http://127.0.0.1:18090"
  cors_origins: ["http://localhost:5173"]
  trusted_proxies:
    - "10.0.0.0/8"
    - "not-a-cidr"
llm:
  provider: "ollama"
  ollama:
    base_url: "http://127.0.0.1:11434"
    model: "fake"
    max_tokens: 50
auth:
  modes:
    anonymous: true
  anonymous:
    allow_without_captcha: false
captcha:
  enabled: false
ratelimit:
  daily_llm_budget:
    action_on_exceeded: "queue"
attachments:
  enabled: true
  max_size_bytes: 20000000
  max_total_bytes: 10000000
  storage:
    mode: "s3"
adapters:
  webhook:
    enabled: true
    url: "http://127.0.0.1:1/discard"
routing:
  default_adapter: "webhook"
