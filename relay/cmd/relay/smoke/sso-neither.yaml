server:
  addr: ":18080"
auth:
  modes:
    anonymous: true
    sso: true
  anonymous:
    allow_without_captcha: true
  sso:
    issuer: "https://example.auth0.com/"
    audience: "https://api.example.com"
ratelimit:
  daily_llm_budget:
    action_on_exceeded: "reject"
adapters:
  webhook:
    enabled: true
    url: "http://127.0.0.1:19099/intake"
routing:
  default_adapter: "webhook"
